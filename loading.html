<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convergent Loading</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500;600&family=Libre+Baskerville:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f7f1e7;
        --paper-warm: #f4ecdd;
        --paper-soft: #f8f5ee;
        --paper-card: #fffdf8;
        --ink-muted: #6b7a90;
        --academic-blue: #2b4c7e;
        --academic-blue-line: #b8cce6;
        --brass: #8b6f47;
        --line: #ded6c9;
        --line-strong: #cbbfaa;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink-muted);
        font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 45% 32%, rgba(255, 253, 248, 0.9), transparent 18rem),
          radial-gradient(circle at 58% 68%, rgba(232, 240, 250, 0.46), transparent 20rem),
          linear-gradient(180deg, var(--paper-soft) 0%, var(--paper) 52%, var(--paper-warm) 100%);
      }

      [data-composition-id="convergent-loading"] {
        position: relative;
        display: grid;
        width: 100vw;
        min-height: 100vh;
        place-items: center;
        overflow: hidden;
      }

      [data-composition-id="convergent-loading"]::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(139, 111, 71, 0.04) 1px, transparent 1px) 0 0 / 24px 24px,
          linear-gradient(rgba(255, 253, 248, 0.5), rgba(255, 253, 248, 0)) 0 0 / 100% 180px no-repeat;
        opacity: 0.7;
      }

      .loader-stage {
        position: relative;
        display: grid;
        width: clamp(13rem, 34vw, 20rem);
        aspect-ratio: 1;
        place-items: center;
        isolation: isolate;
      }

      .quiet-grid {
        position: absolute;
        inset: 8%;
        border: 1px solid rgba(222, 214, 201, 0.42);
        border-radius: 999px;
        background:
          linear-gradient(90deg, rgba(184, 204, 230, 0.22) 1px, transparent 1px) center / 34px 34px,
          linear-gradient(rgba(222, 214, 201, 0.32) 1px, transparent 1px) center / 34px 34px;
        -webkit-mask-image: radial-gradient(circle, black 58%, transparent 72%);
        mask-image: radial-gradient(circle, black 58%, transparent 72%);
        opacity: 0.52;
      }

      .ring,
      .orbit {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        transform-origin: center;
        will-change: transform;
      }

      .ring-outer {
        inset: 4%;
        border: 1px solid rgba(139, 111, 71, 0.26);
        animation: breathe 3.8s ease-in-out infinite;
      }

      .ring-middle {
        inset: 17%;
        border: 1px dashed rgba(184, 204, 230, 0.78);
        animation: spin 9.6s linear infinite;
      }

      .ring-inner {
        inset: 30%;
        border: 1px solid rgba(222, 214, 201, 0.88);
        box-shadow: inset 0 0 0 5px rgba(255, 253, 248, 0.42);
        animation: counter-spin 8.4s linear infinite;
      }

      .orbit-wide {
        inset: 5%;
        animation: spin 2.75s linear infinite;
      }

      .orbit-slow {
        inset: 18%;
        animation: counter-spin 4.65s linear infinite;
      }

      .orbit-tight {
        inset: 31%;
        animation: spin 3.55s linear infinite;
      }

      .dot {
        position: absolute;
        left: 50%;
        top: 0;
        width: 0.6rem;
        aspect-ratio: 1;
        border-radius: 999px;
        box-shadow: 0 4px 12px rgba(86, 72, 49, 0.14);
        transform: translate(-50%, -50%);
      }

      .dot-blue {
        background: var(--academic-blue);
      }

      .dot-cream {
        top: 100%;
        width: 0.46rem;
        background: var(--paper-card);
        border: 1px solid var(--line);
      }

      .dot-slate {
        width: 0.48rem;
        background: var(--ink-muted);
      }

      .dot-brass {
        width: 0.42rem;
        background: var(--brass);
      }

      .badge {
        position: relative;
        z-index: 2;
        display: grid;
        width: 5.8rem;
        aspect-ratio: 1;
        place-items: center;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background:
          radial-gradient(circle at 35% 30%, rgba(255, 253, 248, 0.98), rgba(248, 245, 238, 0.96) 56%, rgba(241, 231, 214, 0.92));
        box-shadow:
          0 1px 0 rgba(255, 253, 248, 0.94) inset,
          0 16px 36px rgba(86, 72, 49, 0.14),
          0 0 0 8px rgba(255, 253, 248, 0.42);
        animation: badge-breathe 2.4s ease-in-out infinite;
      }

      .mark {
        color: var(--academic-blue);
        font-family: "Libre Baskerville", "IBM Plex Serif", Georgia, serif;
        font-size: clamp(2.85rem, 8vw, 4.3rem);
        font-weight: 700;
        line-height: 1;
        text-rendering: geometricPrecision;
        transform: translateY(-0.03em);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes counter-spin {
        to {
          transform: rotate(-360deg);
        }
      }

      @keyframes breathe {
        0%,
        100% {
          transform: scale(0.985);
          opacity: 0.74;
        }
        50% {
          transform: scale(1.015);
          opacity: 1;
        }
      }

      @keyframes badge-breathe {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.018);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .ring,
        .orbit,
        .badge {
          animation-duration: 1ms;
          animation-iteration-count: 1;
        }
      }
    </style>
  </head>
  <body>
    <main
      data-composition-id="convergent-loading"
      data-width="1600"
      data-height="1000"
      role="status"
      aria-label="Loading Convergent"
    >
      <div class="loader-stage" aria-hidden="true">
        <span class="quiet-grid"></span>
        <span class="ring ring-outer"></span>
        <span class="ring ring-middle"></span>
        <span class="ring ring-inner"></span>
        <span class="orbit orbit-wide">
          <span class="dot dot-blue"></span>
          <span class="dot dot-cream"></span>
        </span>
        <span class="orbit orbit-slow">
          <span class="dot dot-slate"></span>
        </span>
        <span class="orbit orbit-tight">
          <span class="dot dot-brass"></span>
        </span>
        <span class="badge">
          <span class="mark">C</span>
        </span>
      </div>
    </main>
  </body>
</html>
